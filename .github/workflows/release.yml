name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build (x86_64 musl)
        run: |
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get install -y musl-tools
          cargo build --release --target x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/invoke-aws-lambda-rs \
             target/x86_64-unknown-linux-musl/release/invoke-aws-lambda-rs-linux-x86_64

      - name: Upload release binary
        uses: softprops/action-gh-release@v2
        with:
          files: target/x86_64-unknown-linux-musl/release/invoke-aws-lambda-rs-linux-x86_64
